<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>厂务设施与配电管理 MVP v3</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--line:#d8e1ec;--blue:#1e6bd6;--dark:#0f2633;--muted:#6b7c8f;--soft:#eaf2ff;--danger:#d64545;--ok:#1f9d68}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:#102434}button,input,select,textarea{font:inherit}button{border:0;border-radius:8px;background:#e9eef5;padding:8px 12px;cursor:pointer}button.primary{background:var(--blue);color:#fff}button.ghost{background:#fff;border:1px solid var(--line)}button.danger{background:#fff0f0;color:var(--danger);border:1px solid #ffd0d0}.login{height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef6ff,#f8fbff)}.login .box{width:360px;background:white;border:1px solid var(--line);box-shadow:0 20px 80px #2342;padding:28px;border-radius:18px}.login h1{font-size:24px;margin:0 0 8px}.login p{color:var(--muted);margin:0 0 20px}.field{margin-bottom:12px}.field label{display:block;font-size:13px;color:#54677a;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff}.app{display:none;height:100vh}.side{width:250px;background:#112536;color:#dce8f5;display:flex;flex-direction:column}.brand{padding:18px;border-bottom:1px solid #ffffff18;font-weight:700}.menu button{display:block;width:100%;text-align:left;color:#dce8f5;background:transparent;border-radius:0;padding:13px 18px}.menu button.active{background:#1f6bd622}.main{flex:1;display:flex;flex-direction:column;min-width:0}.topbar{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px}.content{padding:14px;overflow:auto}.layout{display:grid;grid-template-columns:260px 1fr;gap:12px}.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}.panel h3{margin:0;padding:12px 14px;border-bottom:1px solid var(--line);font-size:16px}.panel .body{padding:12px}.tree .area,.tree .bld,.tree .floor{padding:8px;border-radius:8px;margin:3px 0;cursor:pointer}.tree .area{font-weight:700}.tree .bld{padding-left:18px}.tree .floor{padding-left:34px}.tree .sel{background:var(--soft);color:var(--blue)}.tabs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tabs button.active{background:var(--blue);color:#fff}.work{display:grid;grid-template-rows:auto 1fr;gap:12px;min-height:720px}.viewer{display:grid;grid-template-columns:1fr 1fr;gap:12px}.canvasWrap{height:520px;position:relative;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}.canvasWrap canvas{width:100%;height:100%;display:block}.titleTag{position:absolute;top:10px;left:10px;background:#fffffff0;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-weight:700;color:#164c9b}.toolbar{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;flex-wrap:wrap}.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:8px;padding:7px}.modal{display:none;position:fixed;inset:0;background:#0007;z-index:10;align-items:center;justify-content:center}.dialog{background:#fff;width:min(1120px,96vw);max-height:92vh;overflow:auto;border-radius:14px;box-shadow:0 30px 120px #0008}.dialog .head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}.dialog .body{padding:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.formgrid .span2{grid-column:span 2}.formgrid .span4{grid-column:span 4}.table{width:100%;border-collapse:collapse;background:#fff}.table th,.table td{border:1px solid var(--line);padding:7px;font-size:13px;text-align:left}.table th{background:#f4f8fe}.assetList{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}.assetCard{border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px}.badge{display:inline-block;border-radius:999px;background:#eef4ff;color:#1b62bd;padding:3px 8px;font-size:12px}.iso{height:520px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#fff,#f8fbff);position:relative;overflow:hidden}.isoScene{position:absolute;left:50%;top:48%;transform-style:preserve-3d;transform:translate(-50%,-50%) rotateX(60deg) rotateZ(-35deg)}.floor3d{position:absolute;background:#e8edf2;border:2px solid #9daec0;box-shadow:0 0 0 1px #fff inset}.wall3d{position:absolute;background:#aeb8c3;border:1px solid #8797a8;transform-origin:left bottom}.pin{position:absolute;width:18px;height:18px;border-radius:50%;background:#1e6bd6;border:3px solid white;box-shadow:0 3px 12px #0005;cursor:pointer}.pin.box{background:#f08321}.pin.device{background:#1f9d68}.sectionTitle{font-weight:700;color:#164c9b;margin:16px 0 8px}.hint{color:var(--muted);font-size:12px}.small{font-size:12px;color:var(--muted)}.hidden{display:none!important}@media(max-width:1050px){.layout{grid-template-columns:1fr}.viewer{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div id="login" class="login"><div class="box"><h1>厂务管理系统 MVP v3</h1><p>管理员登录后可编辑楼栋、楼层、墙体和设备信息。</p><div class="field"><label>账号</label><input id="u" value="admin"></div><div class="field"><label>密码</label><input id="p" type="password" value="admin123"></div><button class="primary" style="width:100%" onclick="login()">登录</button><p class="hint" style="margin-top:12px">默认：admin / admin123</p></div></div>
<div id="app" class="app"><aside class="side"><div class="brand">🏭 厂务设施与配电管理</div><div class="menu"><button class="active" onclick="nav('floor')">楼层视图</button><button onclick="nav('building')">楼栋三维管理</button><button onclick="nav('assets')">设备与类别管理</button><button onclick="openJson()">数据导入导出</button></div></aside><main class="main"><div class="topbar"><b id="pageTitle">楼层视图</b><div><span class="small">当前：<span id="crumb"></span></span> <button class="ghost" onclick="logout()">退出</button></div></div><div class="content"><section id="floorPage" class="layout"><div class="panel"><h3>区域 / 楼栋 / 楼层</h3><div class="body"><div class="toolbar"><button class="primary" onclick="addBuilding()">新增楼栋</button><button onclick="addFloor()">新增楼层</button></div><div id="tree" class="tree"></div></div></div><div class="work"><div class="toolbar"><button id="btnTop" class="active" onclick="setView('top')">俯视图</button><button id="btnIso" onclick="setView('iso')">45°三维斜视图</button><button id="btn3d" onclick="setView('b3d')">整栋三维</button><button onclick="toggleEdit()" id="editBtn">进入楼层编辑</button><button onclick="openBoxModal()">新增配电箱</button><button onclick="openDeviceModal()">新增厂务设备</button><button onclick="save()">保存</button><input type="file" id="imgFile" accept="image/*" onchange="loadFloorImage(event)"><span class="hint">编辑模式：拖动画墙，点击选择，设备点位可拖拽</span></div><div class="viewer"><div class="canvasWrap"><div class="titleTag">俯视图 / 编辑区</div><canvas id="topCanvas" width="900" height="580"></canvas></div><div class="iso"><div class="titleTag" id="isoTitle">45°三维斜视图</div><div id="isoScene" class="isoScene"></div></div></div></div></section><section id="buildingPage" class="hidden"><div class="panel"><h3>楼栋三维管理：根据俯视图尺寸生成，位置可编辑</h3><div class="body grid2"><div><div id="buildingForms"></div></div><div class="iso"><div class="titleTag">楼栋三维预览</div><div id="campus3d" class="isoScene"></div></div></div></div></section><section id="assetsPage" class="hidden"><div class="panel"><h3>设备与类别管理</h3><div class="body grid2"><div><div class="toolbar"><input id="catName" placeholder="新类别名称，如冷水机组"><button class="primary" onclick="addCategory()">新增类别</button></div><div id="categoryList"></div></div><div><h3 style="border:0;padding:0 0 8px">当前设备</h3><div id="assetList" class="assetList"></div></div></div></div></section></div></main></div>

<div id="boxModal" class="modal"><div class="dialog"><div class="head"><b>配电箱信息填写模板</b><button onclick="closeModal('boxModal')">×</button></div><div class="body"><div class="formgrid"><div class="field"><label>配电箱编号*</label><input id="boxCode"></div><div class="field"><label>配电箱名称</label><input id="boxName"></div><div class="field"><label>所属楼栋</label><input id="boxBuilding"></div><div class="field"><label>所属楼层</label><input id="boxFloor"></div><div class="field"><label>安装位置</label><input id="boxLocation" placeholder="如：配电室东侧"></div><div class="field"><label>负责人</label><input id="boxOwner"></div><div class="field"><label>安装日期</label><input id="boxDate" type="date"></div><div class="field"><label>箱体类型</label><select id="boxType"><option>动力配电箱</option><option>照明配电箱</option><option>空调配电箱</option><option>消防配电箱</option><option>弱电箱</option></select></div><div class="sectionTitle span4">进线电缆信息</div><div class="field"><label>进线电缆编号*</label><input id="inCableCode" placeholder="YJV-4x95+1x50"></div><div class="field"><label>电缆规格</label><input id="inCableSpec"></div><div class="field"><label>进线回路编号</label><input id="inLoop"></div><div class="field"><label>进线电压(V)</label><input id="inVolt" value="380"></div><div class="field"><label>进线长度(m)</label><input id="inLen" type="number"></div><div class="field"><label>敷设路径</label><input id="inPath" placeholder="桥架/管道/地沟"></div><div class="field"><label>上级配电箱编号*</label><input id="parentBox"></div><div class="field"><label>上级出线开关</label><input id="parentSwitch" placeholder="QF1-160A/3P"></div><div class="sectionTitle span4">总开关与保护</div><div class="field"><label>总开关型号*</label><input id="mainSwitch" placeholder="MCCB-250A/3P"></div><div class="field"><label>总开关额定电流(A)</label><input id="ratedCurrent" type="number"></div><div class="field"><label>分断能力(kA)</label><input id="breaking" type="number"></div><div class="field"><label>漏保/保护方式</label><input id="protect" placeholder="漏电/短路/过载"></div><div class="sectionTitle span4">出线开关列表</div><div class="span4"><table class="table" id="outTable"><thead><tr><th>回路编号</th><th>出线开关</th><th>额定电流(A)</th><th>负载名称</th><th>电缆规格</th><th>操作</th></tr></thead><tbody></tbody></table><button style="margin-top:8px" onclick="addOutRow()">+ 添加出线开关</button></div><div class="field span4"><label>备注</label><textarea id="boxRemark" rows="3"></textarea></div></div><div style="text-align:right"><button onclick="closeModal('boxModal')">取消</button><button class="primary" onclick="saveBox()">保存配电箱</button></div></div></div></div>

<div id="deviceModal" class="modal"><div class="dialog"><div class="head"><b>其他厂务设备自定义信息</b><button onclick="closeModal('deviceModal')">×</button></div><div class="body"><div class="formgrid"><div class="field"><label>设备类别</label><select id="devCat" onchange="renderCustomFields()"></select></div><div class="field"><label>设备编号</label><input id="devCode"></div><div class="field"><label>设备名称</label><input id="devName"></div><div class="field"><label>型号规格</label><input id="devModel"></div><div class="field"><label>品牌/厂家</label><input id="devBrand"></div><div class="field"><label>安装位置</label><input id="devLoc"></div><div class="field"><label>负责人</label><input id="devOwner"></div><div class="field"><label>启用日期</label><input id="devDate" type="date"></div><div class="field span2"><label>保养内容</label><textarea id="maintContent" rows="3" placeholder="清洁滤网、检查压力、紧固端子等"></textarea></div><div class="field"><label>保养周期</label><select id="maintCycle"><option>每周</option><option>每月</option><option>每季度</option><option>每半年</option><option>每年</option></select></div><div class="field"><label>下次保养时间</label><input id="nextMaint" type="date"></div><div class="sectionTitle span4">自定义字段</div><div id="customFields" class="span4 formgrid"></div><div class="span4"><button onclick="addFieldToCategory()">+ 给当前类别添加字段</button></div></div><div style="text-align:right"><button onclick="closeModal('deviceModal')">取消</button><button class="primary" onclick="saveDevice()">保存设备</button></div></div></div></div>

<div id="jsonModal" class="modal"><div class="dialog"><div class="head"><b>JSON 导入 / 导出</b><button onclick="closeModal('jsonModal')">×</button></div><div class="body"><textarea id="jsonText" style="width:100%;height:360px;border:1px solid var(--line);border-radius:8px"></textarea><div style="text-align:right;margin-top:12px"><button onclick="importJson()">导入覆盖</button><button class="primary" onclick="exportJson()">刷新导出</button></div></div></div></div>
<script>
const LS='facility-mvp-v3';let edit=false,view='top',sel={b:'B5',f:'F1'},drawStart=null,dragPin=null;
let data=JSON.parse(localStorage.getItem(LS)||'null')||{areas:[{id:'A1',name:'民企区',buildings:[{id:'B1',name:'1栋',x:-160,y:-60,z:0,w:36,d:24,h:10,floors:[{id:'F1',name:'1F',height:3.6,w:36,d:24,walls:[{x:80,y:80,w:360,h:230}],image:null,assets:[]},{id:'F2',name:'2F',height:3.6,w:36,d:24,walls:[],image:null,assets:[]}]},{id:'B5',name:'5栋',x:80,y:0,z:0,w:48,d:32,h:12,floors:[{id:'F1',name:'1F',height:3.6,w:48,d:32,walls:[{x:70,y:70,w:250,h:150},{x:360,y:80,w:260,h:180},{x:80,y:300,w:520,h:120}],image:null,assets:[{id:'E1',type:'box',x:190,y:140,info:{boxCode:'DB-5-1F-001',boxName:'1F配电箱A01',mainSwitch:'MCCB-250A/3P',parentBox:'MDB-5-001',outRows:[]}}]},{id:'F2',name:'2F',height:3.6,w:48,d:32,walls:[],image:null,assets:[]}]},{id:'B6',name:'6栋',x:210,y:80,z:0,w:30,d:30,h:8,floors:[{id:'F1',name:'1F',height:3.6,w:30,d:30,walls:[],image:null,assets:[]}]}]}],categories:[{name:'空调机组',fields:['制冷量(kW)','电源电压(V)','重量(kg)','运行状态']},{name:'冷水机组',fields:['制冷量(RT)','冷冻水流量','冷却水流量']},{name:'水泵',fields:['流量(m³/h)','扬程(m)','功率(kW)']} ]};
function login(){if(u.value==='admin'&&p.value==='admin123'){login.style.display='none';app.style.display='flex';render()}else alert('账号或密码错误')}
function logout(){location.reload()}function save(){localStorage.setItem(LS,JSON.stringify(data));render();}function curB(){return data.areas[0].buildings.find(b=>b.id===sel.b)}function curF(){return curB().floors.find(f=>f.id===sel.f)}
function render(){document.getElementById('crumb').textContent=curB().name+' / '+curF().name;renderTree();renderTop();renderIso();renderAssets();renderCats();renderBuildingForms();}
function nav(p){floorPage.classList.toggle('hidden',p!=='floor');buildingPage.classList.toggle('hidden',p!=='building');assetsPage.classList.toggle('hidden',p!=='assets');pageTitle.textContent=p==='floor'?'楼层视图':p==='building'?'楼栋三维管理':'设备与类别管理';document.querySelectorAll('.menu button').forEach(x=>x.classList.remove('active'));event.target.classList.add('active');if(p==='building')renderCampus();}
function renderTree(){let html='';data.areas.forEach(a=>{html+=`<div class="area">▾ ${a.name}</div>`;a.buildings.forEach(b=>{html+=`<div class="bld ${sel.b===b.id?'sel':''}" onclick="sel.b='${b.id}';sel.f='${b.floors[0].id}';render()">▾ ${b.name}</div>`;b.floors.forEach(f=>html+=`<div class="floor ${sel.f===f.id?'sel':''}" onclick="sel.b='${b.id}';sel.f='${f.id}';render()">${f.name}</div>`)});});tree.innerHTML=html;}
function setView(v){view=v;btnTop.classList.toggle('active',v==='top');btnIso.classList.toggle('active',v==='iso');btn3d.classList.toggle('active',v==='b3d');renderIso();}function toggleEdit(){edit=!edit;editBtn.textContent=edit?'退出楼层编辑':'进入楼层编辑'}
const canvas=document.getElementById('topCanvas'),ctx=canvas.getContext('2d');function renderTop(){let f=curF();ctx.clearRect(0,0,900,580);ctx.fillStyle='#fff';ctx.fillRect(0,0,900,580);ctx.strokeStyle='#e7eef7';for(let x=0;x<900;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,580);ctx.stroke()}for(let y=0;y<580;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(900,y);ctx.stroke()}if(f.image){let img=new Image();img.onload=()=>{ctx.globalAlpha=.35;ctx.drawImage(img,40,40,820,500);ctx.globalAlpha=1;drawPlan(f)};img.src=f.image}else drawPlan(f)}
function drawPlan(f){ctx.lineWidth=8;ctx.strokeStyle='#657382';f.walls.forEach(w=>ctx.strokeRect(w.x,w.y,w.w,w.h));ctx.lineWidth=1;ctx.fillStyle='#123';ctx.font='14px Microsoft YaHei';ctx.fillText(`${curB().name} ${f.name}  尺寸 ${f.w}m × ${f.d}m  层高 ${f.height}m`,14,24);f.assets.forEach(a=>{ctx.beginPath();ctx.arc(a.x,a.y,10,0,Math.PI*2);ctx.fillStyle=a.type==='box'?'#f08321':'#1f9d68';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#0f2633';ctx.fillText(a.type==='box'?(a.info.boxCode||'配电箱'):(a.info.devName||'设备'),a.x+14,a.y+5);});}
canvas.onmousedown=e=>{let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*900/r.width,y=(e.clientY-r.top)*580/r.height,f=curF();let hit=f.assets.find(a=>Math.hypot(a.x-x,a.y-y)<14);if(hit){dragPin=hit;return}if(edit)drawStart={x,y}};canvas.onmousemove=e=>{if(!dragPin)return;let r=canvas.getBoundingClientRect();dragPin.x=(e.clientX-r.left)*900/r.width;dragPin.y=(e.clientY-r.top)*580/r.height;renderTop();renderIso()};canvas.onmouseup=e=>{let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*900/r.width,y=(e.clientY-r.top)*580/r.height;if(dragPin){dragPin=null;save();return}if(drawStart&&edit){curF().walls.push({x:Math.min(drawStart.x,x),y:Math.min(drawStart.y,y),w:Math.abs(x-drawStart.x),h:Math.abs(y-drawStart.y)});drawStart=null;save();}};canvas.ondblclick=e=>{let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*900/r.width,y=(e.clientY-r.top)*580/r.height,a=curF().assets.find(a=>Math.hypot(a.x-x,a.y-y)<14);if(a){a.type==='box'?openBoxModal(a):openDeviceModal(a)}};
function renderIso(){let f=curF(),b=curB();isoTitle.textContent=view==='top'?'俯视图预览':view==='iso'?'45°三维斜视图':'整栋三维';let html='';let scale=8;if(view==='b3d'){for(let i=0;i<b.floors.length;i++){html+=`<div class="floor3d" style="width:${b.w*scale}px;height:${b.d*scale}px;left:${-b.w*scale/2}px;top:${-b.d*scale/2-i*28}px;transform:translateZ(${i*26}px);background:${i===b.floors.length-1?'#e1e8f0':'#f1f5f9'}"></div>`}}else{html+=`<div class="floor3d" style="width:${f.w*scale}px;height:${f.d*scale}px;left:${-f.w*scale/2}px;top:${-f.d*scale/2}px"></div>`;f.walls.forEach(w=>{let x=(w.x/900-.5)*f.w*scale,y=(w.y/580-.5)*f.d*scale,ww=w.w/900*f.w*scale,hh=w.h/580*f.d*scale;html+=`<div class="wall3d" style="width:${ww}px;height:16px;left:${x}px;top:${y}px;transform:translateZ(${f.height*18}px)"></div><div class="wall3d" style="width:${hh}px;height:16px;left:${x}px;top:${y}px;transform:rotateZ(90deg) translateZ(${f.height*18}px)"></div>`});f.assets.forEach(a=>{let x=(a.x/900-.5)*f.w*scale,y=(a.y/580-.5)*f.d*scale;html+=`<div class="pin ${a.type==='box'?'box':'device'}" style="left:${x}px;top:${y}px;transform:translateZ(${f.height*20}px)" title="${a.type}"></div>`})}isoScene.innerHTML=html;}
function loadFloorImage(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{curF().image=reader.result;save();};reader.readAsDataURL(file)}function addBuilding(){let name=prompt('楼栋名称','新楼栋');if(!name)return;let id='B'+Date.now();data.areas[0].buildings.push({id,name,x:0,y:0,z:0,w:30,d:20,h:8,floors:[{id:'F1',name:'1F',height:3.6,w:30,d:20,walls:[],image:null,assets:[]}]});sel.b=id;sel.f='F1';save()}function addFloor(){let name=prompt('楼层名称','2F');if(!name)return;curB().floors.push({id:'F'+Date.now(),name,height:3.6,w:curB().w,d:curB().d,walls:[],image:null,assets:[]});save()}
let editAsset=null;function openBoxModal(a){editAsset=a||null;boxBuilding.value=curB().name;boxFloor.value=curF().name;document.querySelector('#outTable tbody').innerHTML='';if(a){let i=a.info;['boxCode','boxName','boxLocation','boxOwner','boxDate','boxType','inCableCode','inCableSpec','inLoop','inVolt','inLen','inPath','parentBox','parentSwitch','mainSwitch','ratedCurrent','breaking','protect','boxRemark'].forEach(k=>{let el=document.getElementById(k);if(el)el.value=i[k]||''});(i.outRows||[]).forEach(r=>addOutRow(r))}else{boxCode.value='DB-'+curB().name+'-'+curF().name+'-'+String(curF().assets.length+1).padStart(3,'0');boxName.value='';addOutRow()}boxModal.style.display='flex'}function addOutRow(r={}){let tr=document.createElement('tr');tr.innerHTML=`<td><input value="${r.loop||''}"></td><td><input value="${r.sw||''}"></td><td><input type="number" value="${r.cur||''}"></td><td><input value="${r.load||''}"></td><td><input value="${r.cable||''}"></td><td><button onclick="this.closest('tr').remove()">删</button></td>`;document.querySelector('#outTable tbody').appendChild(tr)}function saveBox(){let keys=['boxCode','boxName','boxBuilding','boxFloor','boxLocation','boxOwner','boxDate','boxType','inCableCode','inCableSpec','inLoop','inVolt','inLen','inPath','parentBox','parentSwitch','mainSwitch','ratedCurrent','breaking','protect','boxRemark'];let info={};keys.forEach(k=>info[k]=document.getElementById(k).value);info.outRows=[...document.querySelectorAll('#outTable tbody tr')].map(tr=>{let v=[...tr.querySelectorAll('input')].map(i=>i.value);return{loop:v[0],sw:v[1],cur:v[2],load:v[3],cable:v[4]}});if(editAsset)editAsset.info=info;else curF().assets.push({id:'A'+Date.now(),type:'box',x:120+Math.random()*200,y:120+Math.random()*150,info});closeModal('boxModal');save()}
function openDeviceModal(a){editAsset=a||null;fillCatSelect();if(a){let i=a.info;devCat.value=i.category||data.categories[0].name;['devCode','devName','devModel','devBrand','devLoc','devOwner','devDate','maintContent','maintCycle','nextMaint'].forEach(k=>document.getElementById(k).value=i[k]||'')}else{devCode.value='EQ-'+Date.now().toString().slice(-5);['devName','devModel','devBrand','devLoc','devOwner','devDate','maintContent','nextMaint'].forEach(k=>document.getElementById(k).value='')}renderCustomFields(a&&a.info.custom);deviceModal.style.display='flex'}function fillCatSelect(){devCat.innerHTML=data.categories.map(c=>`<option>${c.name}</option>`).join('')}function renderCustomFields(vals={}){let cat=data.categories.find(c=>c.name===devCat.value)||data.categories[0];customFields.innerHTML=cat.fields.map(f=>`<div class="field"><label>${f}</label><input data-f="${f}" value="${vals[f]||''}"></div>`).join('')}function addFieldToCategory(){let f=prompt('字段名称','功率(kW)');if(!f)return;let cat=data.categories.find(c=>c.name===devCat.value);cat.fields.push(f);renderCustomFields();save()}function saveDevice(){let info={category:devCat.value};['devCode','devName','devModel','devBrand','devLoc','devOwner','devDate','maintContent','maintCycle','nextMaint'].forEach(k=>info[k]=document.getElementById(k).value);info.custom={};customFields.querySelectorAll('input').forEach(i=>info.custom[i.dataset.f]=i.value);if(editAsset)editAsset.info=info;else curF().assets.push({id:'A'+Date.now(),type:'device',x:160+Math.random()*260,y:180+Math.random()*200,info});closeModal('deviceModal');save()}
function closeModal(id){document.getElementById(id).style.display='none'}function addCategory(){let n=catName.value.trim();if(!n)return;data.categories.push({name:n,fields:[]});catName.value='';save()}function renderCats(){categoryList.innerHTML=data.categories.map((c,i)=>`<div class="assetCard"><b>${c.name}</b><p class="small">字段：${c.fields.join('、')||'无'}</p><button onclick="let f=prompt('新增字段'); if(f){data.categories[${i}].fields.push(f); save()}">加字段</button> <button class="danger" onclick="data.categories.splice(${i},1);save()">删除类别</button></div>`).join('')}function renderAssets(){let arr=[];data.areas[0].buildings.forEach(b=>b.floors.forEach(f=>f.assets.forEach(a=>arr.push({b:b.name,f:f.name,a}))));assetList.innerHTML=arr.map(x=>`<div class="assetCard"><span class="badge">${x.a.type==='box'?'配电箱':'厂务设备'}</span><h4>${x.a.type==='box'?(x.a.info.boxCode||x.a.info.boxName):(x.a.info.devName||x.a.info.devCode)}</h4><p class="small">位置：${x.b} / ${x.f}</p><p>${x.a.type==='box'?('上级：'+(x.a.info.parentBox||'-')+'，总开关：'+(x.a.info.mainSwitch||'-')):('类别：'+(x.a.info.category||'-')+'，保养：'+(x.a.info.maintCycle||'-'))}</p></div>`).join('')}
function renderBuildingForms(){buildingForms.innerHTML=data.areas[0].buildings.map((b,i)=>`<div class="assetCard"><h4>${b.name}</h4><div class="grid3"><div class="field"><label>宽度m</label><input type="number" value="${b.w}" onchange="data.areas[0].buildings[${i}].w=+this.value;save()"></div><div class="field"><label>深度m</label><input type="number" value="${b.d}" onchange="data.areas[0].buildings[${i}].d=+this.value;save()"></div><div class="field"><label>高度m</label><input type="number" value="${b.h}" onchange="data.areas[0].buildings[${i}].h=+this.value;save()"></div><div class="field"><label>X位置</label><input type="number" value="${b.x}" onchange="data.areas[0].buildings[${i}].x=+this.value;save()"></div><div class="field"><label>Y位置</label><input type="number" value="${b.y}" onchange="data.areas[0].buildings[${i}].y=+this.value;save()"></div><div class="field"><label>Z位置</label><input type="number" value="${b.z}" onchange="data.areas[0].buildings[${i}].z=+this.value;save()"></div></div></div>`).join('');renderCampus()}function renderCampus(){let scale=5;campus3d.innerHTML=data.areas[0].buildings.map(b=>`<div class="floor3d" title="${b.name}" style="width:${b.w*scale}px;height:${b.d*scale}px;left:${b.x}px;top:${b.y}px;transform:translateZ(${b.z}px);box-shadow:${b.h*3}px ${b.h*3}px 0 #bac5cf"><b style="position:absolute;left:8px;top:8px">${b.name}</b></div>`).join('')}
function openJson(){jsonModal.style.display='flex';exportJson()}function exportJson(){jsonText.value=JSON.stringify(data,null,2)}function importJson(){try{data=JSON.parse(jsonText.value);save();closeModal('jsonModal')}catch(e){alert('JSON格式错误')}}
window.onload=()=>{};
</script>
</body></html>
