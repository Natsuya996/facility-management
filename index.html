<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>办公区域导视与工位管理系统 MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">S</div><strong>办公区域导视与工位管理系统</strong></div>
      <div class="side-section"><div class="side-title">区域管理</div><div id="regionTree"></div></div>
      <div class="side-section"><div class="side-title">办公楼管理</div><div id="buildingList"></div></div>
      <div class="side-section"><div class="side-title">楼层管理</div><div id="floorList"></div><button class="primary small" id="addFloorBtn">+ 楼层</button></div>
      <div class="search"><input placeholder="搜索员工 / 部门 / 工位 / 设备" /></div>
      <div class="version">© 2024 MVP v4.0</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="crumb">区域管理 / <span id="crumbRegion">民企区域</span> / <span id="crumbBuilding">5栋</span> / <span id="crumbFloor">1F</span></div>
        <div class="actions"><button id="resetBtn">刷新</button><button id="exportBtn">导出</button><button id="importBtn">导入</button><button id="saveBtn" class="primary">保存</button><span class="user">admin ▾</span><input type="file" id="importFile" hidden accept="application/json" /></div>
      </header>

      <section class="hero card">
        <div class="canvas-toolbar">
          <button class="tab active" data-view="region">区域三维总览</button>
          <button class="tab" data-view="building">楼栋三维</button>
          <button class="tab" data-view="floor3d">楼层三维</button>
          <button class="tab" data-view="floor2d">楼层平面图</button>
          <span class="hint">同一图窗切换，滚轮缩放、拖拽移动、双击复位</span>
        </div>
        <div class="view-wrap" id="viewWrap">
          <svg id="mainSvg" viewBox="0 0 1200 520" role="img"></svg>
        </div>
        <div class="floor-switch"><span>楼层选择：</span><div id="floorButtons"></div></div>
      </section>

      <section class="grid-two">
        <div class="card editor">
          <div class="panel-title">楼层编辑</div>
          <div class="tools">
            <button id="selectTool" class="active">选择</button><button id="wallTool">绘制墙体</button><button id="deleteWallBtn">删除墙体</button><button id="roomTool">划分房间</button><button id="clearBtn">清空画布</button>
            <label>墙体宽度 <input id="wallWidth" type="number" value="240" min="80" max="600" /> mm</label>
            <label>层高 <input id="floorHeight" type="number" value="3.6" step="0.1" min="2" /> m</label>
          </div>
          <div class="plan-wrap"><svg id="planSvg" viewBox="0 0 760 420"></svg></div>
          <div class="current">当前选中：<b id="selectedText">配电箱 DB-1F-001</b></div>
        </div>

        <div class="card stats">
          <div class="panel-title">区域设备统计</div>
          <div id="statsList"></div>
          <hr />
          <div class="panel-title">新增点位</div>
          <div class="icon-palette" id="palette"></div>
          <p class="muted">点击图标后，在平面图上点击放置。配电箱与设备使用不同图标。</p>
        </div>
      </section>

      <section class="card form-card">
        <div class="panel-title">设备 / 配电箱信息</div>
        <div class="tabs"><button class="info-tab active" data-info="base">基本信息</button><button class="info-tab" data-info="in">进线信息</button><button class="info-tab" data-info="out">出线信息</button><button class="info-tab" data-info="maint">保养记录</button><button class="info-tab" data-info="custom">类别字段</button></div>
        <div id="formArea"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
