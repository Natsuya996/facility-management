<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>厂务管理系统 MVP Latest</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="login" class="login-page">
  <div class="login-card">
    <h1>厂务管理系统</h1>
    <p>设施、楼层、配电箱、三维/二维管理 MVP</p>
    <input id="username" placeholder="账号：admin" />
    <input id="password" type="password" placeholder="密码：admin123" />
    <button onclick="login()">登录</button>
    <small>数据保存在当前浏览器 LocalStorage</small>
  </div>
</div>

<div id="app" class="app hidden">
  <aside class="sidebar">
    <div class="brand">厂务管理系统</div>
    <button class="nav active" onclick="switchModule('map')">楼层视图</button>
    <button class="nav" onclick="switchModule('building')">楼栋三维</button>
    <button class="nav" onclick="switchModule('assets')">设备管理</button>
    <button class="nav" onclick="switchModule('settings')">类别字段</button>
    <button class="nav" onclick="switchModule('data')">数据导入导出</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h2 id="pageTitle">楼层视图</h2>
        <span id="currentPath">民企区 / 5栋 / 1F</span>
      </div>
      <div class="actions">
        <button onclick="saveData()">保存</button>
        <button onclick="resetDemo()">恢复示例</button>
      </div>
    </header>

    <section id="module-map" class="module grid-layout">
      <div class="panel tree-panel">
        <h3>区域楼层</h3>
        <div class="row"><select id="areaSelect"></select><button onclick="addArea()">+区域</button></div>
        <div class="row"><select id="buildingSelect"></select><button onclick="addBuilding()">+楼栋</button></div>
        <div class="row"><select id="floorSelect"></select><button onclick="addFloor()">+楼层</button></div>
        <hr>
        <h3>视图模式</h3>
        <div class="segmented">
          <button id="btn-top" onclick="setView('top')">俯视图</button>
          <button id="btn-45" onclick="setView('iso')">45°三维斜视</button>
          <button id="btn-edit" onclick="setView('edit')">楼层编辑</button>
        </div>
        <h3>新增点位</h3>
        <button onclick="addAsset('配电箱')">+ 配电箱</button>
        <button onclick="addAsset('空调机组')">+ 空调机组</button>
        <button onclick="addAsset('水泵')">+ 水泵</button>
      </div>

      <div class="panel canvas-panel">
        <div class="canvas-toolbar">
          <strong id="viewName">俯视图</strong>
          <span>点击设备点位可编辑信息；编辑模式下可绘制墙体。</span>
        </div>
        <div id="floorCanvas" class="floor-canvas"></div>
      </div>

      <div id="editPanel" class="panel edit-panel">
        <h3>楼层编辑</h3>
        <label>层高(m)<input id="floorHeight" type="number" step="0.1" /></label>
        <label>俯视图长度(m)<input id="floorLength" type="number" step="0.1" /></label>
        <label>俯视图宽度(m)<input id="floorWidth" type="number" step="0.1" /></label>
        <label>导入平面图<input id="planUpload" type="file" accept="image/*" onchange="uploadPlan(event)" /></label>
        <button onclick="toggleDrawWall()" id="drawWallBtn">开始绘制墙体</button>
        <button onclick="autoGenerateWalls()">根据图片/尺寸生成墙体</button>
        <button onclick="clearWalls()">清空墙体</button>
        <button onclick="applyFloorSettings()">生成单层三维图</button>
        <p class="hint">绘制墙体：点击起点和终点生成一段墙。墙体会用于45°三维示意。</p>
      </div>
    </section>

    <section id="module-building" class="module hidden">
      <div class="panel split">
        <div>
          <h3>楼栋管理</h3>
          <label>楼栋名称<input id="bName" /></label>
          <label>X位置<input id="bX" type="number" /></label>
          <label>Y位置<input id="bY" type="number" /></label>
          <label>旋转角度<input id="bRot" type="number" /></label>
          <button onclick="saveBuildingEdit()">保存楼栋位置</button>
          <p class="hint">楼栋三维尺寸由各楼层的俯视图长度、宽度、层高累计生成。</p>
        </div>
        <div>
          <h3>楼栋三维预览</h3>
          <div id="building3d" class="building-3d"></div>
        </div>
      </div>
    </section>

    <section id="module-assets" class="module hidden">
      <div class="panel">
        <h3>设备列表</h3>
        <table id="assetTable"></table>
      </div>
    </section>

    <section id="module-settings" class="module hidden">
      <div class="panel split">
        <div>
          <h3>设备类别</h3>
          <div id="categoryList"></div>
          <button onclick="addCategory()">+ 新增类别</button>
        </div>
        <div>
          <h3>类别自定义字段</h3>
          <div id="fieldList"></div>
          <button onclick="addField()">+ 新增字段</button>
        </div>
      </div>
    </section>

    <section id="module-data" class="module hidden">
      <div class="panel">
        <h3>数据导入导出</h3>
        <button onclick="exportJson()">导出 JSON</button>
        <input type="file" accept="application/json" onchange="importJson(event)">
        <textarea id="jsonBox" placeholder="导出的JSON会显示在这里"></textarea>
      </div>
    </section>
  </main>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-card large">
    <div class="modal-head"><h3 id="modalTitle">设备信息</h3><button onclick="closeModal()">×</button></div>
    <div id="modalBody"></div>
    <div class="modal-foot"><button onclick="closeModal()">取消</button><button onclick="saveAssetModal()">保存</button></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
